<!DOCTYPE html>
<html>
<head>
<title>AWS RDS Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#020617,#0f172a,#312e81);
color:white;
}

nav{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
background:#111827;
}

nav button{
padding:16px 40px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,cyan,magenta);
color:white;
font-weight:bold;
cursor:pointer;
}

.section{
padding:60px;
display:none;
}

.active{display:block;}

h1{
font-family:Orbitron;
text-align:center;
font-size:3rem;
text-shadow:0 0 20px cyan;
}

input{
width:100%;
padding:18px;
margin:12px 0;
border:none;
border-radius:15px;
font-size:1rem;
}

.mainbtn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#06b6d4,#d946ef);
color:white;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:18px;
backdrop-filter:blur(10px);
animation:float 3s infinite ease-in-out;
}

@keyframes float{
50%{transform:translateY(-10px);}
}

.popup{
position:fixed;
top:20px;
right:20px;
padding:20px;
border-radius:14px;
display:none;
font-weight:bold;
z-index:999;
}

.search-item{
background:#1e293b;
padding:16px;
border-radius:12px;
margin:10px 0;
}
</style>
</head>
<body>

<div class="popup" id="popup"></div>

<nav>
<button onclick="showTab('rds')">RDS Info</button>
<button onclick="showTab('manage')">Manage Users</button>
<button onclick="showTab('search')">Search Users</button>
</nav>

<div id="rds" class="section active">
<h1>AWS RDS</h1>
<p style="text-align:center;font-size:20px;">
Amazon RDS manages MySQL, PostgreSQL, Oracle,
MariaDB, SQL Server and Aurora with automated
backups, scaling, replication and security.
</p>
</div>

<div id="manage" class="section">
<h1>Manage Users</h1>

<input id="name" placeholder="Enter Name">
<input id="age" placeholder="Enter Age">
<input id="country" placeholder="Enter Country">

<button class="mainbtn" onclick="saveUser()">Create / Update User</button>

<div class="grid" id="users"></div>
</div>

<div id="search" class="section">
<h1>Search Users</h1>

<input id="searchBox" placeholder="Type user name..." onkeyup="searchUser()">

<div id="searchResults"></div>
</div>

<script>

let selectedId=null;

function popup(msg,color){
let p=document.getElementById("popup");
p.innerHTML=msg;
p.style.background=color;
p.style.display="block";
setTimeout(()=>p.style.display="none",3000);
}

function showTab(tab){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(tab).classList.add('active');
if(tab==="manage") loadUsers();
}

async function saveUser(){

const userName=document.getElementById("name").value.trim();
const userAge=document.getElementById("age").value.trim();
const userCountry=document.getElementById("country").value.trim();

let route='/save';
let method='POST';

if(selectedId){
route=`/update/${selectedId}`;
method='PUT';
}

const res=await fetch(route,{
method:method,
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:userName,
age:userAge,
country:userCountry
})
});

const data=await res.json();

if(res.ok){
popup(data.message,"green");
loadUsers();
selectedId=null;
}else{
popup(data.error,"red");
}
}

async function loadUsers(){
let res=await fetch('/users');
let users=await res.json();

let html='';

users.forEach(u=>{
html+=`
<div class="card">
<h2>${u.name}</h2>
<p>Age: ${u.age}</p>
<p>${u.country}</p>
<button class="mainbtn" onclick="editUser(${u.id},'${u.name}',${u.age},'${u.country}')">Update</button>
<br><br>
<button class="mainbtn" onclick="deleteUser(${u.id})">Delete</button>
</div>`;
});

document.getElementById('users').innerHTML=html;
}

function editUser(id,n,a,c){
selectedId=id;
document.getElementById("name").value=n;
document.getElementById("age").value=a;
document.getElementById("country").value=c;
popup("Editing User","orange");
}

async function deleteUser(id){
let res=await fetch(`/delete/${id}`,{method:'DELETE'});
let data=await res.json();
popup(data.message,"red");
loadUsers();
}

async function searchUser(){

const q=document.getElementById("searchBox").value;

if(!q){
document.getElementById("searchResults").innerHTML="";
return;
}

let res=await fetch(`/search/${q}`);
let users=await res.json();

let html='';

users.forEach(u=>{
html+=`
<div class="search-item">
${u.name} | Age: ${u.age} | ${u.country}
</div>`;
});

document.getElementById("searchResults").innerHTML=html;
}

loadUsers();

</script>

</body>
</html>
